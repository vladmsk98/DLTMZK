<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>КРИСТАЛГАЙЗ</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="banner-section">
    <!-- Баннер -->
    <p><img src="image/BANNER.jpg" alt="BANNER"></p>
  </header>
  <div class="container" id="tracks-container">
    <!-- Блок для фильтров по тегам и году -->
    <div class="filters-section">
      <div id="tag-filters"></div>
      <div id="year-filter"></div>
    </div>
    <!-- Блок для элементов поиска и сортировки -->
    <div class="controls-section">
      <input type="text" id="search-input" placeholder="Поиск по названию...">
      <select id="sort-select">
        <option value="">Сортировать по...</option>
        <option value="title-asc">Названию (А-Я)</option>
        <option value="title-desc">Названию (Я-А)</option>
        <option value="year-asc">Году (старые первые)</option>
        <option value="year-desc">Году (новые первые)</option>
        <option value="duration-asc">Продолжительности (короткие первые)</option>
        <option value="duration-desc">Продолжительности (долгие первые)</option>
      </select>
    </div>
    <!-- Треки будут добавлены сюда динамически -->
    <div id="tracks-list"></div>
  </div>
  <button class="toggle-theme" id="theme-toggle">Сменить тему</button>
    <div id="share-modal" class="share-modal">
      <div class="share-modal-content">
        <h3>Поделиться аудио</h3>
        <div class="share-platforms">
          <button class="share-platform-btn" data-platform="vk">ВКонтакте</button>
          <button class="share-platform-btn" data-platform="ok">Одноклассники</button>
          <button class="share-platform-btn" data-platform="bluesky">Bluesky</button>
          <button class="share-platform-btn copy-link-btn" data-platform="copy">Копировать ссылку</button>
        </div>
        <button id="close-share-modal" class="close-modal-btn">Закрыть</button>
      </div>
    </div>
  <script src="script.js"></script>
</body>
</html>
